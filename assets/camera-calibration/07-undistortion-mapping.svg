<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">去畸变反向映射与双线性插值</title>
  <desc id="desc">输出像素通过畸变模型反查源图亚像素坐标，再由四邻域插值。</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L10 3 0 6Z" fill="#111827"/></marker></defs>
  <rect width="1200" height="700" fill="#FFFFFF"/>
  <g font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, sans-serif" fill="#111827">
    <text x="600" y="55" text-anchor="middle" font-size="32" font-weight="700">去畸变采用反向映射</text>
    <text x="180" y="115" text-anchor="middle" font-size="26">① 输出图像</text><text x="585" y="115" text-anchor="middle" font-size="26">② 畸变模型反查</text><text x="990" y="115" text-anchor="middle" font-size="26">③ 源图四邻域</text>
    <rect x="60" y="150" width="240" height="300" fill="#FFFFFF" stroke="#111827" stroke-width="3"/>
    <path d="M60 210H300M60 270H300M60 330H300M60 390H300M120 150V450M180 150V450M240 150V450" stroke="#D1D5DB" stroke-width="2"/>
    <rect x="174" y="264" width="12" height="12" fill="#F59E0B" stroke="#111827" stroke-width="2"/>
    <text x="180" y="490" text-anchor="middle" font-size="24">目标像素 (u,v)</text>
    <path d="M310 270H455" stroke="#111827" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="470" y="195" width="230" height="155" rx="18" fill="#FFFFFF" stroke="#111827" stroke-width="3"/>
    <text x="585" y="245" text-anchor="middle" font-size="24">应用畸变模型</text><text x="585" y="285" text-anchor="middle" font-size="24">正向几何关系</text><text x="585" y="325" text-anchor="middle" font-size="24" fill="#2563EB">(u,v) → (xₛ,yₛ)</text>
    <path d="M710 270H830" stroke="#111827" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="850" y="150" width="280" height="300" fill="#FFFFFF" stroke="#111827" stroke-width="3"/>
    <path d="M850 250H1130M850 350H1130M943 150V450M1037 150V450" stroke="#D1D5DB" stroke-width="2"/>
    <g fill="#FFFFFF" stroke="#111827" stroke-width="3"><circle cx="943" cy="250" r="9"/><circle cx="1037" cy="250" r="9"/><circle cx="943" cy="350" r="9"/><circle cx="1037" cy="350" r="9"/></g>
    <circle cx="985" cy="308" r="9" fill="#F59E0B" stroke="#111827" stroke-width="2"/>
    <path d="M985 308L943 250M985 308L1037 250M985 308L943 350M985 308L1037 350" stroke="#2563EB" stroke-width="2" stroke-dasharray="8 6"/>
    <text x="990" y="490" text-anchor="middle" font-size="24">亚像素坐标 (xₛ,yₛ)</text>
    <path d="M990 515V565H295" fill="none" stroke="#111827" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="300" y="540" width="600" height="90" rx="18" fill="#FFFFFF" stroke="#111827" stroke-width="3"/>
    <text x="600" y="578" text-anchor="middle" font-size="24">双线性插值：四邻域像素按距离加权</text>
    <text x="600" y="612" text-anchor="middle" font-size="24" fill="#16A34A">得到平滑的输出像素值 I(u,v)</text>
  </g>
</svg>
