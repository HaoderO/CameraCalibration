<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">三个相机标定示例程序的处理流程</title>
  <desc id="desc">用三条并行泳道展示单目标定、虚拟广告牌和双目标定程序的输入、OpenCV处理步骤、输出与诊断结果。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#111827"/></marker>
    <style>
      text{font-family:"Microsoft YaHei","PingFang SC","Noto Sans CJK SC",sans-serif;fill:#111827}
      .title{font-size:32px;font-weight:700}.sub{font-size:24px;fill:#4B5563}.lane-title{font-size:26px;font-weight:700}
      .box{fill:#fff;stroke:#111827;stroke-width:3}.soft{fill:#F9FAFB;stroke:#D1D5DB;stroke-width:2}
      .step{font-size:24px;font-weight:600}.small{font-size:24px;fill:#4B5563}.flow{fill:none;stroke:#111827;stroke-width:3;marker-end:url(#arrow)}
      .input{fill:#EFF6FF;stroke:#2563EB}.output{fill:#F0FDF4;stroke:#16A34A}.diag{fill:#FFF7ED;stroke:#F59E0B}
    </style>
  </defs>
  <rect width="1200" height="820" fill="#fff"/>
  <text x="60" y="62" class="title">代码速览：三个示例程序各自在做什么？</text>
  <text x="60" y="96" class="sub">同样是“图像进入、结果输出”，核心运算与质量检查并不相同。</text>

  <rect x="45" y="135" width="1110" height="190" rx="18" class="soft"/>
  <rect x="65" y="160" width="160" height="140" rx="14" class="box"/>
  <text x="145" y="205" text-anchor="middle" class="lane-title">单目标定</text><text x="145" y="240" text-anchor="middle" class="small"><tspan x="145" y="240">calibration</tspan><tspan x="145" y="268">.cpp</tspan></text>
  <rect x="260" y="180" width="170" height="100" rx="12" class="box input"/><text x="345" y="218" text-anchor="middle" class="step">棋盘格照片</text><text x="345" y="247" text-anchor="middle" class="small">角点规格</text><text x="345" y="274" text-anchor="middle" class="small">方格尺寸</text>
  <path d="M430 230H480" class="flow"/>
  <rect x="480" y="165" width="260" height="130" rx="12" class="box"/><text x="610" y="190" text-anchor="middle" class="step"><tspan x="610" y="190">findChessboard</tspan><tspan x="610" y="214">Corners</tspan></text><text x="610" y="238" text-anchor="middle" class="small">角点细化</text><text x="610" y="262" text-anchor="middle" class="small"><tspan x="610" y="262">calibrateCamera</tspan><tspan x="610" y="286">→ K、dist、R、t</tspan></text>
  <path d="M740 230H790" class="flow"/>
  <rect x="790" y="180" width="150" height="100" rx="12" class="box output"/><text x="865" y="220" text-anchor="middle" class="step">标定参数</text><text x="865" y="250" text-anchor="middle" class="small">YAML / XML</text>
  <path d="M940 230H980" class="flow"/>
  <rect x="980" y="180" width="150" height="100" rx="12" class="box diag"/><text x="1055" y="214" text-anchor="middle" class="step">重投影误差</text><text x="1055" y="244" text-anchor="middle" class="small"><tspan x="1055" y="244">越小越</tspan><tspan x="1055" y="270">一致</tspan></text>

  <rect x="45" y="345" width="1110" height="190" rx="18" class="soft"/>
  <rect x="65" y="370" width="160" height="140" rx="14" class="box"/>
  <text x="145" y="412" text-anchor="middle" class="lane-title">虚拟广告牌</text><text x="145" y="447" text-anchor="middle" class="small"><tspan x="145" y="447">virtual-</tspan><tspan x="145" y="475">billboard.cpp</tspan></text>
  <rect x="260" y="390" width="170" height="100" rx="12" class="box input"/><text x="345" y="430" text-anchor="middle" class="step">场景 + Logo</text><text x="345" y="460" text-anchor="middle" class="small">广告牌四角点</text>
  <path d="M430 440H480" class="flow"/>
  <rect x="480" y="375" width="260" height="130" rx="12" class="box"/><text x="610" y="400" text-anchor="middle" class="step"><tspan x="610" y="400">getPerspective</tspan><tspan x="610" y="424">Transform</tspan></text><text x="610" y="448" text-anchor="middle" class="small">求单应矩阵 H</text><text x="610" y="476" text-anchor="middle" class="small">warpPerspective</text><text x="610" y="500" text-anchor="middle" class="small">掩膜融合</text>
  <path d="M740 440H790" class="flow"/>
  <rect x="790" y="390" width="150" height="100" rx="12" class="box output"/><text x="865" y="424" text-anchor="middle" class="step">合成画面</text><text x="865" y="454" text-anchor="middle" class="small"><tspan x="865" y="454">Logo 贴合</tspan><tspan x="865" y="480">平面</tspan></text>
  <path d="M940 440H980" class="flow"/>
  <rect x="980" y="390" width="150" height="100" rx="12" class="box diag"/><text x="1055" y="424" text-anchor="middle" class="step">边角对齐</text><text x="1055" y="454" text-anchor="middle" class="small"><tspan x="1055" y="454">检查透视</tspan><tspan x="1055" y="480">一致性</tspan></text>

  <rect x="45" y="555" width="1110" height="190" rx="18" class="soft"/>
  <rect x="65" y="580" width="160" height="140" rx="14" class="box"/>
  <text x="145" y="625" text-anchor="middle" class="lane-title">双目标定</text><text x="145" y="660" text-anchor="middle" class="small"><tspan x="145" y="660">stereo_calib</tspan><tspan x="145" y="688">.cpp</tspan></text>
  <rect x="260" y="600" width="170" height="100" rx="12" class="box input"/><text x="345" y="638" text-anchor="middle" class="step">左右图像对</text><text x="345" y="668" text-anchor="middle" class="small">同一姿态</text><text x="345" y="695" text-anchor="middle" class="small">成对照片</text>
  <path d="M430 650H480" class="flow"/>
  <rect x="480" y="585" width="260" height="130" rx="12" class="box"/><text x="610" y="617" text-anchor="middle" class="step">stereoCalibrate</text><text x="610" y="649" text-anchor="middle" class="small">求 R、T、E、F</text><text x="610" y="677" text-anchor="middle" class="small"><tspan x="610" y="677">stereoRectify</tspan><tspan x="610" y="705">→ remap</tspan></text>
  <path d="M740 650H790" class="flow"/>
  <rect x="790" y="600" width="150" height="100" rx="12" class="box output"/><text x="865" y="634" text-anchor="middle" class="step">校正图像对</text><text x="865" y="664" text-anchor="middle" class="small"><tspan x="865" y="664">极线水平</tspan><tspan x="865" y="690">对齐</tspan></text>
  <path d="M940 650H980" class="flow"/>
  <rect x="980" y="600" width="150" height="100" rx="12" class="box diag"/><text x="1055" y="634" text-anchor="middle" class="step">极线误差</text><text x="1055" y="664" text-anchor="middle" class="small"><tspan x="1055" y="664">同名点应</tspan><tspan x="1055" y="690">同高</tspan></text>
  <text x="60" y="790" class="small">颜色提示：蓝框是输入，绿框是输出，橙框是结果是否可信的诊断量。</text>
</svg>
