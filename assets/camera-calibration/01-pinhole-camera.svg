<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">针孔相机成像模型</title>
  <desc id="desc">直立物体发出的两条主光线经过光心，在像平面形成倒立影像，并标出焦距。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#111827"/></marker>
    <style>.t{font-family:"Microsoft YaHei","PingFang SC","Noto Sans CJK SC",sans-serif;fill:#111827}.main{stroke:#111827;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}.help{stroke:#2563EB;stroke-width:2;fill:none}.dash{stroke-dasharray:8 6}</style>
  </defs>
  <rect width="1200" height="700" fill="#FFFFFF"/>
  <text class="t" x="600" y="55" text-anchor="middle" font-size="32" font-weight="700">针孔相机：光线经光心形成倒立影像</text>
  <line class="main dash" x1="90" y1="350" x2="1110" y2="350"/>
  <text class="t" x="1080" y="335" font-size="24">光轴</text>
  <line class="main" x1="250" y1="430" x2="250" y2="170" marker-end="url(#arrow)"/>
  <path d="M215 430H285" class="main"/>
  <text class="t" x="250" y="405" text-anchor="middle" font-size="28" font-weight="700">物体</text>
  <line class="main" x1="720" y1="115" x2="720" y2="585"/>
  <text class="t" x="720" y="625" text-anchor="middle" font-size="26">像平面</text>
  <circle cx="600" cy="350" r="9" fill="#F59E0B" stroke="#111827" stroke-width="3"/>
  <text class="t" x="600" y="315" text-anchor="middle" font-size="26" font-weight="700">光心 O</text>
  <line class="help" x1="250" y1="170" x2="720" y2="411.714"/>
  <line class="help" x1="250" y1="430" x2="720" y2="322.571"/>
  <circle cx="250" cy="170" r="7" fill="#2563EB" stroke="#111827" stroke-width="2"/>
  <circle cx="250" cy="430" r="7" fill="#2563EB" stroke="#111827" stroke-width="2"/>
  <line class="main" x1="720" y1="322.571" x2="720" y2="411.714" marker-end="url(#arrow)"/>
  <circle cx="720" cy="322.571" r="7" fill="#2563EB" stroke="#111827" stroke-width="2"/>
  <circle cx="720" cy="411.714" r="7" fill="#2563EB" stroke="#111827" stroke-width="2"/>
  <text class="t" x="760" y="420" font-size="28" font-weight="700">倒立影像</text>
  <line class="main" x1="600" y1="540" x2="720" y2="540" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text class="t" x="660" y="575" text-anchor="middle" font-size="26">焦距 f</text>
  <text class="t" x="355" y="150" font-size="24">代表点 A</text>
  <text class="t" x="355" y="455" font-size="24">代表点 B</text>
</svg>

