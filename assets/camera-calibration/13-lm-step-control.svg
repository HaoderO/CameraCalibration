<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">LM 阻尼步长控制</title>
  <desc id="desc">LM 算法根据试探步骤成败增减阻尼参数，平衡梯度下降与高斯牛顿更新。</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L9 3L0 6Z" fill="#111827"/></marker></defs>
  <rect width="1200" height="700" fill="#FFFFFF"/>
  <g font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, sans-serif" fill="#111827">
    <text x="600" y="55" text-anchor="middle" font-size="32" font-weight="700">LM：用阻尼参数 λ 控制每一步</text>
    <rect x="390" y="105" width="420" height="100" rx="18" fill="#FFFFFF" stroke="#111827" stroke-width="3"/>
    <text x="600" y="148" text-anchor="middle" font-size="25">计算试探更新 Δθ</text><text x="600" y="183" text-anchor="middle" font-size="25">比较 E(θ + Δθ) 与 E(θ)</text>
    <path d="M600 205V270" stroke="#111827" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M600 270L735 350L600 430L465 350Z" fill="#FFFFFF" stroke="#111827" stroke-width="3"/>
    <text x="600" y="342" text-anchor="middle" font-size="24">误差是否</text><text x="600" y="375" text-anchor="middle" font-size="24">降低？</text>
    <path d="M465 350H270V440" fill="none" stroke="#111827" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M735 350H930V440" fill="none" stroke="#111827" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="360" y="330" font-size="24" fill="#DC2626">否：试探失败</text><text x="820" y="330" font-size="24" fill="#16A34A">是：试探成功</text>
    <rect x="75" y="450" width="390" height="170" rx="16" fill="#FFFFFF" stroke="#111827" stroke-width="3"/>
    <text x="270" y="495" text-anchor="middle" font-size="27" fill="#DC2626">增大 λ，拒绝该步</text>
    <text x="270" y="540" text-anchor="middle" font-size="24">更谨慎、更像梯度下降</text><text x="270" y="580" text-anchor="middle" font-size="24">步长较小，稳定优先</text>
    <rect x="735" y="450" width="390" height="170" rx="16" fill="#FFFFFF" stroke="#111827" stroke-width="3"/>
    <text x="930" y="495" text-anchor="middle" font-size="27" fill="#16A34A">减小 λ，接受该步</text>
    <text x="930" y="540" text-anchor="middle" font-size="24">更大胆、更像高斯—牛顿</text><text x="930" y="580" text-anchor="middle" font-size="24">利用曲率，加速收敛</text>
    <path d="M270 620V660H600V215" fill="none" stroke="#111827" stroke-width="3" stroke-dasharray="8 6" marker-end="url(#arrow)"/>
    <path d="M930 620V660H600" fill="none" stroke="#111827" stroke-width="3"/>
  </g>
</svg>
