<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">相机内参与外参</title>
  <desc id="desc">左侧说明相机自身的内参，右侧说明相机位置和朝向的外参。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#111827"/></marker>
    <style>.t{font-family:"Microsoft YaHei","PingFang SC","Noto Sans CJK SC",sans-serif;fill:#111827}.main{stroke:#111827;stroke-width:3;fill:none;stroke-linejoin:round}.help{stroke:#2563EB;stroke-width:2;fill:none}.card{fill:#fff;stroke:#111827;stroke-width:3}</style>
  </defs>
  <rect width="1200" height="700" fill="#FFFFFF"/><text class="t" x="600" y="55" text-anchor="middle" font-size="32" font-weight="700">标定参数：相机自身 vs. 相机姿态</text>
  <line x1="600" y1="90" x2="600" y2="650" stroke="#D1D5DB" stroke-width="3"/>
  <rect class="card" x="40" y="105" width="520" height="520" rx="18"/><text class="t" x="300" y="155" text-anchor="middle" font-size="30" font-weight="700">内参：相机自身</text>
  <rect x="145" y="205" width="310" height="230" fill="#fff" stroke="#111827" stroke-width="3"/>
  <line class="main" x1="300" y1="320" x2="420" y2="320" marker-end="url(#arrow)"/><line class="main" x1="300" y1="320" x2="300" y2="230" marker-end="url(#arrow)"/>
  <circle cx="300" cy="320" r="9" fill="#F59E0B" stroke="#111827" stroke-width="2"/><text class="t" x="315" y="354" font-size="24">主点 (cx, cy)</text>
  <text class="t" x="160" y="490" font-size="28" font-weight="700">fx, fy</text><text class="t" x="265" y="490" font-size="24">焦距（像素尺度）</text>
  <text class="t" x="160" y="540" font-size="28" font-weight="700">cx, cy</text><text class="t" x="265" y="540" font-size="24">光轴与传感器交点</text>
  <rect class="card" x="640" y="105" width="520" height="520" rx="18"/><text class="t" x="900" y="155" text-anchor="middle" font-size="30" font-weight="700">外参：相机在哪里、朝哪里</text>
  <path class="main" d="M715 500V260M715 500H1050M715 500L800 565"/><text class="t" x="690" y="260" font-size="24">Yw</text><text class="t" x="1035" y="535" font-size="24">Xw</text><text class="t" x="800" y="595" font-size="24">Zw</text>
  <g transform="translate(875 335) rotate(-18)"><path d="M-45 30L0-35L45 30Z" fill="#fff" stroke="#111827" stroke-width="3"/><rect x="-32" y="30" width="64" height="38" fill="#fff" stroke="#111827" stroke-width="3"/><path class="help" d="M0-35V-125" marker-end="url(#arrow)"/></g>
  <path d="M715 500L875 385" class="help" marker-end="url(#arrow)"/><text class="t" x="770" y="425" font-size="28" font-weight="700">t</text>
  <path d="M945 455A90 90 0 0 0 990 380" class="main" marker-end="url(#arrow)"/><text class="t" x="995" y="445" font-size="28" font-weight="700">R</text>
  <text class="t" x="900" y="575" text-anchor="middle" font-size="24">R：旋转矩阵　t：平移向量</text>
</svg>

