<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">张正友标定流程</title>
  <desc id="desc">从多幅标定板图像，经角点、单应性、内外参与畸变初值，进入非线性优化并输出标定结果。</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#111827"/></marker></defs>
  <rect width="1200" height="700" fill="#FFFFFF"/>
  <g font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, sans-serif" fill="#111827">
    <text x="600" y="58" text-anchor="middle" font-size="32" font-weight="700">张正友平面标定：从图像到最优参数</text>
    <g stroke="#111827" stroke-width="3" fill="#FFFFFF">
      <rect x="40" y="150" width="240" height="120" rx="14"/><rect x="340" y="150" width="240" height="120" rx="14"/>
      <rect x="640" y="150" width="240" height="120" rx="14"/><rect x="940" y="150" width="220" height="120" rx="14"/>
      <rect x="190" y="390" width="240" height="120" rx="14"/><rect x="500" y="390" width="240" height="120" rx="14"/>
      <rect x="810" y="390" width="300" height="120" rx="14"/>
    </g>
    <g font-size="25" text-anchor="middle">
      <text x="160" y="198">多幅棋盘格图像</text><text x="160" y="235" fill="#2563EB">不同姿态</text>
      <text x="460" y="198">检测内角点</text><text x="460" y="235" fill="#F59E0B">像素坐标 pᵢ</text>
      <text x="760" y="198">估计单应矩阵</text><text x="760" y="235">每幅图 Hᵢ</text>
      <text x="1050" y="198">初始内参</text><text x="1050" y="235">K₀</text>
      <text x="310" y="438">逐幅外参</text><text x="310" y="475">Rᵢ，tᵢ</text>
      <text x="620" y="438">畸变初值</text><text x="620" y="475">k₁，k₂，p₁，p₂</text>
      <text x="960" y="432">非线性联合优化</text><text x="960" y="472" fill="#16A34A">最小化重投影误差</text>
    </g>
    <g stroke="#111827" stroke-width="3" fill="none" marker-end="url(#arrow)">
      <path d="M280 210H330"/><path d="M580 210H630"/><path d="M880 210H930"/>
      <path d="M1050 270V330H310V380"/><path d="M430 450H490"/><path d="M740 450H800"/>
    </g>
    <rect x="350" y="580" width="500" height="78" rx="16" fill="#FFFFFF" stroke="#111827" stroke-width="3"/>
    <path d="M960 510V548H850V618" fill="none" stroke="#111827" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="600" y="613" font-size="27" text-anchor="middle">输出：K、畸变、各幅 R/t</text>
    <text x="600" y="646" font-size="24" text-anchor="middle" fill="#DC2626">诊断：均方根重投影误差 RMS</text>
  </g>
</svg>
