<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">五种相机投影模型</title>
  <desc id="desc">对比透视、等距、等立体角、立体和正交投影的角度与半径关系。</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L10 3 0 6Z" fill="#111827"/></marker></defs>
  <rect width="1200" height="700" fill="#FFFFFF"/>
  <text x="600" y="55" text-anchor="middle" font-size="32" font-weight="700" fill="#111827" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, sans-serif">入射角 θ 如何映射为像面半径 r</text>
  <g font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, sans-serif">
    <g transform="translate(35 110)"><rect width="210" height="500" rx="16" fill="#FFFFFF" stroke="#111827" stroke-width="3"/><text x="105" y="45" text-anchor="middle" font-size="26" fill="#111827">透视投影</text><path d="M35 335H180M55 390V120M55 335L165 155" stroke="#111827" stroke-width="3"/><path d="M55 335A55 55 0 0 1 87 285" fill="none" stroke="#2563EB" stroke-width="2"/><path d="M55 225H165" stroke="#F59E0B" stroke-width="3" marker-end="url(#arrow)"/><text x="80" y="300" font-size="24" fill="#2563EB">θ</text><text x="110" y="215" font-size="24" fill="#111827">r</text><text x="105" y="455" text-anchor="middle" font-size="24" fill="#111827">r = f tan θ</text></g>
    <g transform="translate(265 110)"><rect width="210" height="500" rx="16" fill="#FFFFFF" stroke="#111827" stroke-width="3"/><text x="105" y="45" text-anchor="middle" font-size="26" fill="#111827">等距投影</text><path d="M35 335H180M55 390V120M55 335L165 155" stroke="#111827" stroke-width="3"/><path d="M55 335A55 55 0 0 1 87 285" fill="none" stroke="#2563EB" stroke-width="2"/><path d="M55 245H145" stroke="#F59E0B" stroke-width="3" marker-end="url(#arrow)"/><text x="80" y="300" font-size="24" fill="#2563EB">θ</text><text x="95" y="235" font-size="24" fill="#111827">r</text><text x="105" y="455" text-anchor="middle" font-size="24" fill="#111827">r = f θ</text></g>
    <g transform="translate(495 110)"><rect width="210" height="500" rx="16" fill="#FFFFFF" stroke="#111827" stroke-width="3"/><text x="105" y="45" text-anchor="middle" font-size="26" fill="#111827">等立体角</text><path d="M35 335H180M55 390V120M55 335L165 155" stroke="#111827" stroke-width="3"/><path d="M55 335A55 55 0 0 1 87 285" fill="none" stroke="#2563EB" stroke-width="2"/><path d="M55 240H150" stroke="#F59E0B" stroke-width="3" marker-end="url(#arrow)"/><text x="80" y="300" font-size="24" fill="#2563EB">θ</text><text x="100" y="230" font-size="24" fill="#111827">r</text><text x="105" y="445" text-anchor="middle" font-size="24" fill="#111827">r = 2f sin(θ/2)</text></g>
    <g transform="translate(725 110)"><rect width="210" height="500" rx="16" fill="#FFFFFF" stroke="#111827" stroke-width="3"/><text x="105" y="45" text-anchor="middle" font-size="26" fill="#111827">立体投影</text><path d="M35 335H180M55 390V120M55 335L165 155" stroke="#111827" stroke-width="3"/><path d="M55 335A55 55 0 0 1 87 285" fill="none" stroke="#2563EB" stroke-width="2"/><path d="M55 225H165" stroke="#F59E0B" stroke-width="3" marker-end="url(#arrow)"/><text x="80" y="300" font-size="24" fill="#2563EB">θ</text><text x="110" y="215" font-size="24" fill="#111827">r</text><text x="105" y="445" text-anchor="middle" font-size="24" fill="#111827">r = 2f tan(θ/2)</text></g>
    <g transform="translate(955 110)"><rect width="210" height="500" rx="16" fill="#FFFFFF" stroke="#111827" stroke-width="3"/><text x="105" y="45" text-anchor="middle" font-size="26" fill="#111827">正交投影</text><path d="M35 335H180M55 390V120M55 335L165 155" stroke="#111827" stroke-width="3"/><path d="M55 335A55 55 0 0 1 87 285" fill="none" stroke="#2563EB" stroke-width="2"/><path d="M55 260H135" stroke="#F59E0B" stroke-width="3" marker-end="url(#arrow)"/><text x="80" y="300" font-size="24" fill="#2563EB">θ</text><text x="90" y="250" font-size="24" fill="#111827">r</text><text x="105" y="455" text-anchor="middle" font-size="24" fill="#111827">r = f sin θ</text></g>
  </g>
  <text x="600" y="660" text-anchor="middle" font-size="24" fill="#111827" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, sans-serif">同一入射角 θ，在不同模型中得到不同的像面半径 r</text>
</svg>
